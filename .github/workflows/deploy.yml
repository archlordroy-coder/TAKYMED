name: Deploy to Production Server

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to server
      env:
        HOST: ${{ secrets.SERVER_HOST }}
        USER: ${{ secrets.SERVER_USER }}
      run: |
        # Create exclude list for sensitive files
        cat > rsync-exclude.txt << EOF
        .env
        bd.sqlite*
        uploads/
        node_modules/
        dist/
        .git/
        .gitignore
        EOF
        
        # Sync files to server
        rsync -avz --exclude-from=rsync-exclude.txt \
          -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
          ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/TAKYMED/
          
    - name: Install dependencies on server
      env:
        HOST: ${{ secrets.SERVER_HOST }}
        USER: ${{ secrets.SERVER_USER }}
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
          cd /home/TAKYMED
          npm ci --production
        '
        
    - name: Build on server
      env:
        HOST: ${{ secrets.SERVER_HOST }}
        USER: ${{ secrets.SERVER_USER }}
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
          cd /home/TAKYMED
          npm run build
        '
        
    - name: Restart application
      env:
        HOST: ${{ secrets.SERVER_HOST }}
        USER: ${{ secrets.SERVER_USER }}
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
          cd /home/TAKYMED
          pm2 restart takymed || pm2 start dist/server/node-build.mjs --name takymed
        '
        
    - name: Health check
      env:
        APP_URL: ${{ secrets.APP_URL }}
      run: |
        echo "Waiting for server to start..."
        for i in {1..5}; do
          if curl -f -s "${{ secrets.APP_URL }}" > /dev/null; then
            echo "✅ Health check passed! Application is responding."
            exit 0
          fi
          echo "Attempt $i/5 failed, waiting 10 seconds..."
          sleep 10
        done
        echo "❌ Health check failed after 5 attempts"
        exit 1
        
    - name: Notify deployment status
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "🎉 Deployment successful!"
        else
          echo "❌ Deployment failed!"
        fi
